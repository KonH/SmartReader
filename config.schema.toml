# SmartReader configuration schema
# Copy this file to config.toml and adjust values to your needs.

[scoring]
upvote_power = 1.5    # Interest delta applied on upvote
downvote_power = -1.0 # Interest delta applied on downvote
skip = []             # Stop-words excluded from all keyword scorers; editable at runtime via 'skip'
# openai_prompt = "..."           # Global prompt fallback for openai_score stages; editable at runtime via 'prompt'
# openai_interests_prompt = "..." # Global interests prompt fallback; editable at runtime via 'interests prompt'

# ── Pipeline stages ──────────────────────────────────────────────────────────
# Define the processing pipeline as an ordered array of stages.
# Each stage receives the output of the previous stage.
# Stages run in order; use top_n to limit items between stages.

# Keyword scorer — adds score based on keyword interests (title + summary/body)
[[pipeline]]
type = "keyword_score"
common_weight = 1.0   # Weight applied to global keyword interests
category_weight = 1.5 # Weight applied to per-category interests

# Shuffle — adds random noise to scores for diversification
# [[pipeline]]
# type = "shuffle"
# noise_factor = 0.5  # score += random() * noise_factor

# Top-N selector — keeps only the top N items by score
[[pipeline]]
type = "top_n"
n = 10                # Max items to pass to the next stage

# Summarize — calls the active Summarize implementation on each item
# [[pipeline]]
# type = "summarize"

# Trim — truncates item.summary to a maximum number of lines/characters
# [[pipeline]]
# type = "trim"
# lines = 10          # max lines to keep from the summary
# chars = 500         # optional: max total characters (omit = no limit)

# OpenAI scorer — uses an LLM to judge article relevance.
# Requires OPENAI_API_KEY environment variable.
# Accumulates feedback (upvotes/downvotes) and summarizes user preferences
# at next startup to improve future scoring.
# [[pipeline]]
# type         = "openai_score"
# score_factor = 1.0           # score range: [-score_factor, +score_factor]
# model        = "gpt-4o-mini" # OpenAI model ID
# prompt       = "..."         # optional: override global openai_prompt

# Final top-N for display
[[pipeline]]
type = "top_n"
n = 5

# ── Telegram Bot UI (optional) ────────────────────────────────────────────────
# Set active = true to receive content via a Telegram bot instead of the terminal.
# Credentials are loaded from environment variables (see .env.example):
#   TELEGRAM_BOT_TOKEN – bot token from @BotFather
#   TELEGRAM_API_ID    – integer, from https://my.telegram.org/apps
#   TELEGRAM_API_HASH  – string,  from https://my.telegram.org/apps
#
# WARNING: controller_usernames restricts who can trigger runs.
# An empty list allows ANY Telegram user to start the pipeline!
#
# [telegram_ui]
# active = false
# controller_usernames = ["yourusername"]   # without @
# upvote_reaction   = "👍"
# downvote_reaction = "👎"

# ── Telegram user API (optional) ──────────────────────────────────────────────
# Set active = true to enable Telegram channel sources.
# Credentials are loaded from environment variables (see .env.example):
#   TELEGRAM_API_ID   – integer, from https://my.telegram.org/apps
#   TELEGRAM_API_HASH – string,  from https://my.telegram.org/apps
#   TELEGRAM_SESSION  – optional StringSession export for non-interactive auth
#
# [telegram]
# active = false
# read_source_min_interval = 1000   # ms – minimum pause between channel reads
# read_source_max_interval = 3000   # ms – maximum pause (actual delay is random in [min, max])

# Sources — add one [[sources.<name>]] block per feed.
#
# RSS example:
# [[sources.technology]]
# type       = "rss"                        # "rss" | "telegram"
# externalId = "https://example.com/rss"    # feed URL
# category   = "technology"                 # optional, drives category-level scoring
# [sources.technology.custom]               # optional extra metadata
#
# Telegram example (requires [telegram] active = true):
# [[sources.my_channel]]
# type       = "telegram"
# externalId = "@channelname"               # public username, -100… channel ID, or t.me link
# category   = "technology"                 # optional
