# SmartReader configuration schema
# Copy this file to config.toml and adjust values to your needs.

[scoring]
top_n_l1 = 10         # Max articles passed to the summarizer after L1 keyword scoring
top_n_l2 = 5          # Max articles shown to the user after L2 scoring (post-summarize)

[scoring.keyword]
common_weight = 1.0   # Weight applied to global keyword interests
category_weight = 1.5 # Weight applied to per-category interests

# ── Summarizer ────────────────────────────────────────────────────────────────
# [summarize.trim] trims the summary produced by the active Summarize implementation.
# Useful to keep Telegram messages or terminal output concise.
#
# [summarize.trim]
# active = false
# lines  = 10     # max lines to keep from the summary
# chars  = 500    # optional: max total characters (omit = no limit)

# ── Telegram Bot UI (optional) ────────────────────────────────────────────────
# Set active = true to receive content via a Telegram bot instead of the terminal.
# Credentials are loaded from environment variables (see .env.example):
#   TELEGRAM_BOT_TOKEN – bot token from @BotFather
#   TELEGRAM_API_ID    – integer, from https://my.telegram.org/apps
#   TELEGRAM_API_HASH  – string,  from https://my.telegram.org/apps
#
# WARNING: controller_usernames restricts who can trigger runs.
# An empty list allows ANY Telegram user to start the pipeline!
#
# [telegram_ui]
# active = false
# controller_usernames = ["yourusername"]   # without @
# upvote_reaction   = "👍"
# downvote_reaction = "👎"

# ── Telegram user API (optional) ──────────────────────────────────────────────
# Set active = true to enable Telegram channel sources.
# Credentials are loaded from environment variables (see .env.example):
#   TELEGRAM_API_ID   – integer, from https://my.telegram.org/apps
#   TELEGRAM_API_HASH – string,  from https://my.telegram.org/apps
#   TELEGRAM_SESSION  – optional StringSession export for non-interactive auth
#
# [telegram]
# active = false
# read_source_min_interval = 1000   # ms – minimum pause between channel reads
# read_source_max_interval = 3000   # ms – maximum pause (actual delay is random in [min, max])

# Sources — add one [[sources.<name>]] block per feed.
#
# RSS example:
# [[sources.technology]]
# type       = "rss"                        # "rss" | "telegram"
# externalId = "https://example.com/rss"    # feed URL
# category   = "technology"                 # optional, drives category-level scoring
# [sources.technology.custom]               # optional extra metadata
#
# Telegram example (requires [telegram] active = true):
# [[sources.my_channel]]
# type       = "telegram"
# externalId = "@channelname"               # public username, -100… channel ID, or t.me link
# category   = "technology"                 # optional
